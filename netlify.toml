[build]
  command = "npm run build"
  # publish = ".next"  # 삭제: Netlify 플러그인이 자동으로 경로 설정

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  # 주의: .env.local 파일 포함 설정은 배포 에러의 주원인이므로 제거했습니다.
  # 환경 변수는 Netlify 사이트 설정(Environment variables)에 등록해야 합니다.

[build.environment]
  NODE_VERSION = "20"

# 배포 시 Durable Cache 자동 퍼지
[context.production.environment]
  NETLIFY_PURGE_DURABLE_CACHE = "true"

# HTML 페이지 - 항상 서버에서 최신 확인 (배포 후 즉시 반영)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"

# _next/static 빌드 자산 - 해시 포함이라 장기 캐싱 안전
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# _next/data (페이지 데이터 JSON) - 배포마다 갱신
[[headers]]
  for = "/_next/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "public, max-age=0, must-revalidate"