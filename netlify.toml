[build]
  command = "npm run build"
  # publish = ".next"  # 삭제: Netlify 플러그인이 자동으로 경로 설정

# ─── 도메인 마이그레이션: 구도메인 → 새도메인 영구 301 (경로 보존) ───
# 구도메인은 alias 라 기본적으로 사이트가 dual-serve 됨 → SEO duplicate.
# 명시 301 룰로 강제 리다이렉트하여 검색엔진/북마크 모두 새 도메인으로 인계.
# force = true 로 alias 의 기본 서빙보다 우선 적용.
[[redirects]]
  from = "https://lostarkweeklygold.kr/*"
  to = "https://loalogol.kr/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.lostarkweeklygold.kr/*"
  to = "https://loalogol.kr/:splat"
  status = 301
  force = true

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Netlify 이미지 CDN — 랭킹 카드 아바타 리사이즈용 (원본 55~133KB JPEG → ~5KB WebP)
# /.netlify/images?url=... 로 요청하면 리사이즈+포맷 변환+엣지 캐시. 허용 원격 도메인 명시 필수.
[images]
  remote_images = ["https://img.lostark.co.kr/.*"]

# 배포 성공 후 Durable Cache 전체 퍼지 (Cloudflare 경유 캐시 포함)
[[plugins]]
  package = "./plugins/purge-cache"

[functions]
  node_bundler = "esbuild"
  # 주의: .env.local 파일 포함 설정은 배포 에러의 주원인이므로 제거했습니다.
  # 환경 변수는 Netlify 사이트 설정(Environment variables)에 등록해야 합니다.

[build.environment]
  NODE_VERSION = "20"

# Durable Cache 비활성화 - 배포 시 이전 캐시가 남아 페이지 갱신 안 되는 문제 방지
[context.production.environment]
  NETLIFY_PURGE_DURABLE_CACHE = "true"